apiVersion: v1
kind: Service
metadata:
  name: {{ include "infergo.fullname" . }}
  labels:
    {{- include "infergo.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.infergo.grpcPort }}
    - port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    {{- end }}
  selector:
    {{- include "infergo.selectorLabels" . | nindent 4 }}
