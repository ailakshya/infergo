name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Go: pure-Go packages (no CGo, no GPU required) ──────────────────────────
  go-test:
    name: Go tests (pure-Go packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: go vet
        working-directory: go
        run: go vet ./hub/... ./grpc/... ./client/...

      - name: go test — hub
        working-directory: go
        run: go test -race -count=1 ./hub/...

      - name: go test — grpc
        working-directory: go
        run: go test -race -count=1 ./grpc/...

      - name: go test — client
        working-directory: go
        run: go test -race -count=1 ./client/...

  # ── Go: server package (pure-Go subset, no CGo) ──────────────────────────────
  go-test-server:
    name: Go tests (server — no CGo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: go test — server (metrics, auth, queue, tracing, websocket)
        working-directory: go
        # batcher.go has a //go:build cgo constraint so it is excluded here.
        # All other server code (routing, health, metrics, auth, queue, tracing) is pure Go.
        env:
          CGO_ENABLED: "0"
        run: go test -race -count=1 ./server/...

  # ── Helm: dry-run validation ──────────────────────────────────────────────────
  helm-lint:
    name: Helm lint + dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: helm lint
        run: helm lint deploy/helm/infergo/

      - name: helm template (dry-run validation)
        run: helm template infergo deploy/helm/infergo/ --debug > /dev/null

  # ── C++ build + tests (GPU not required for unit tests) ──────────────────────
  cpp-test:
    name: C++ build + gtest (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build libopenblas-dev libgtest-dev libgmock-dev wget curl

      - name: Install ONNX Runtime
        run: |
          ARCH=$(uname -m | sed 's/x86_64/x64/;s/aarch64/aarch64/')
          wget -q "https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-linux-${ARCH}-1.24.4.tgz"
          sudo tar -xzf "onnxruntime-linux-${ARCH}-1.24.4.tgz" -C /opt
          sudo mv "/opt/onnxruntime-linux-${ARCH}-1.24.4" /opt/onnxruntime
          echo "/opt/onnxruntime/lib" | sudo tee /etc/ld.so.conf.d/onnxruntime.conf
          sudo ldconfig

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust tokenizer
        run: cargo build --release --manifest-path tokenizer-rs/Cargo.toml

      - name: Generate ONNX test fixtures
        run: |
          pip install onnx numpy --quiet
          python3 - <<'EOF'
          import numpy as np
          import onnx
          from onnx import numpy_helper, TensorProto, helper
          x = helper.make_tensor_value_info('x', TensorProto.FLOAT, [1, 4])
          y = helper.make_tensor_value_info('y', TensorProto.FLOAT, [1, 4])
          scale = numpy_helper.from_array(np.array([2.0], dtype=np.float32), name='scale')
          node = helper.make_node('Mul', inputs=['x', 'scale'], outputs=['y'])
          graph = helper.make_graph([node], 'scale', [x], [y], initializer=[scale])
          model = helper.make_model(graph, opset_imports=[helper.make_opsetid('', 17)])
          onnx.save(model, '/tmp/scale.onnx')
          print('Created /tmp/scale.onnx')
          EOF

      - name: Configure (CPU only)
        env:
          ONNXRUNTIME_ROOT: /opt/onnxruntime
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_CUDA=OFF \
            -DGGML_BLAS=ON \
            -DGGML_BLAS_VENDOR=OpenBLAS \
            -DINFER_CUDA=OFF \
            -DINFER_TESTS=ON \
            -DONNXRUNTIME_ROOT=/opt/onnxruntime

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc)
